spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aero
    username: aero
    password: aero
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  upload-dir: ./uploads/kml