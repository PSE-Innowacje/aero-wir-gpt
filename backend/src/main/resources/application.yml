spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/aero}
  docker:
    compose:
      file: ../docker-compose.yml
      lifecycle-management: start-only
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  # Render terminates TLS at its edge and forwards HTTP to the container.
  # Reading X-Forwarded-* headers lets Spring know the original request was HTTPS,
  # which is required for Secure session cookies to be issued correctly.
  forward-headers-strategy: framework
